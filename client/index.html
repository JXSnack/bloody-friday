<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Bloody Friday</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap"
	      rel="stylesheet">

	<style>
        * {
            box-sizing: border-box;
        }

        html, body {
            display: flex;
            align-items: center;
            justify-content: center;

            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #fff;
            font-family: Inter, sans-serif;
        }

        #mm {
            display: flex;
            flex-direction: column;

            align-items: center;
            text-align: center;
        }

        #title {
            margin: 0;
            font-size: clamp(72px, 13vw, 130px);
            line-height: 0.94;
            letter-spacing: .04em;
            font-family: "Bebas Neue", sans-serif;
        }

        #title > span {
            color: #c0160f;
        }

        .tagline {
            font-size: 11px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: #7a7a7a;
            margin: 8px 0 48px;
        }

        .form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .form input {
            width: 100%;
            padding: 13px 18px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 4px;
            color: #e8e8e8;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            text-align: center;
            transition: border-color .15s;
        }

        .form input::placeholder {
            color: #363636;
        }

        .form input:focus {
            border-color: #7a0c08;
        }

        #name-error {
            font-size: 11px;
            color: #c0160f;
            height: 14px;
            letter-spacing: .04em;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #c0160f;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, transform .1s;
        }

        button:hover {
            background: #de1a11;
        }

        button:active {
            transform: scale(.98);
        }

        #monitor {
            align-items: center;
	        text-align: center;
        }

        #monitor > h1 {
            font-size: 64px;
        }

        #members {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;

	        justify-content: center;
	        max-width: 700px;
        }

        #members p {
            background-color: white;
            color: black;
            padding: 5px 10px;

            cursor: pointer;
            transition: 0.1s;
	        margin: 0;
        }

        #members p:hover {
            text-decoration: line-through;
            transform: scale(1.1);
        }
	</style>
</head>
<body>

<div id="mm">
	<div id="login">
		<h1 id="title">BLOODY<br/><span>FRIDAY</span></h1>
		<p class="tagline">wat als het niet uitkwam?</p>
		<div class="form">
			<input id="username" type="text" placeholder="Voer je naam in" minlength="3" maxlength="32"
			       autocomplete="off"
			       spellcheck="false"/>
			<p id="name-error"></p>
			<button id="play-btn">Ik ben bereid!</button>
		</div>
	</div>

	<div id="wait" hidden>
		<h1>Nog eventjes wachten</h1>
		<p class="tagline">We wachten tot het spel is gestart</p>
	</div>
</div>

<div id="monitor" style="display: none">
	<h1>friday.snackbag.net</h1>

	<div id="members"></div>

	<button id="m-start" style="position: absolute; bottom: 15px; right: 15px; width: 150px">Start</button>
</div>

<script type="text/javascript">
    let mm = document.querySelector("#mm");
    let mon = document.querySelector("#monitor")

    function bootUser() {
        let login = document.querySelector("#login");
        let waiting = document.querySelector("#wait");
        let playBtn = document.querySelector("#play-btn");

        playBtn.addEventListener("click", () => {
            let uname = document.getElementById("username").value;
            uname = uname.replace(/^\s+|\s+$/g, "");

            if (uname.length < 3) {
                document.querySelector("#name-error").innerText = "Naam is te kort";
                return;
            }

            login.setAttribute("hidden", "");
            waiting.removeAttribute("hidden");

            document.dispatchEvent(new CustomEvent("game:init", {detail: {username: uname}}));
        });

        document.addEventListener("game:start", () => {
            mm.setAttribute("style", "display: none");
        });

        document.addEventListener("game:authDenied", (e) => {
            let reason = e.detail.reason;
            alert(reason);
            window.location.reload();
        });
    }

    function bootMonitor() {
        let pass = prompt("password")
        if (pass !== "croissant") {
            document.body.innerHTML = "";
            return;
        }

        let startBtn = document.querySelector("#m-start");
        let members = document.querySelector("#members");

        mm.setAttribute("style", "display: none");
        mon.setAttribute("style", "");

        let ws = new WebSocket(`${window.location.protocol === "https:" ? "wss://friday.snackbag.net/ws/" : "ws://127.0.0.1:5174/"}}`);
        ws.onopen = () => {
            ws.send("MONITOR");
        }

        ws.onmessage = (message) => {
            let msg = JSON.parse(message.data);
            console.log(msg)

	        if (msg.sender === "server") {
                if (msg.type === "join") {
                    let p = document.createElement("p");
                    p.innerText = msg.name;
                    p.id = msg.uuid;
                    p.onclick = () => {
                        ws.send(JSON.stringify({"type": "kick", "uuid": msg.uuid}));
                    }
                    members.append(p);
                } else if (msg.type === "disconnect") {
                    let p = document.getElementById(msg.uuid);
                    p.remove();
                }
            }
        }

        startBtn.addEventListener("click", () => {
            ws.send(JSON.stringify({"type": "start"}));
            startBtn.remove();
        })
    }

    if (location.hash === "#monitor") bootMonitor();
    else bootUser();
</script>

</body>
</html>
